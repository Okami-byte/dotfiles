#
#  Smart session manager for the terminal
#  https://github.com/joshmedeski/sesh

# import = ["~/.config/sesh/configs/nu-sesh.toml"]
#:schema https://github.com/joshmedeski/sesh/raw/main/sesh.schema.json
blacklist = ["scratch"]

# Introduces a caching layer in order to speed up load times
cache = false

# Makes it aware of the separators
separator_aware = true

# default

[default_session]
startup_command = "la"
startup_command_ignore_dirs = ["~/repos", "~/.config"]
preview_command = "eza --all --git --icons --color=always {}"

# common

[[session]]
name = "notes 󱞁 "
path = "~/Notes"
startup_command = "nvim "

[[session]]
name = "python-dev 󰌠 "
path = "~/Developer/Projects/Python"
startup_command = "nvim "

[[session]]
name = "videos 󰗃 "
path = "~/Videos"
startup_command = "yazi"

[[session]]
name = "developer 󰅴 "
path = "~/Developer/Projects"
startup_command = "la"

[[session]]
name = "claude 󱙺 "
path = "~/.claude"
startup_command = "claude"

[[session]]
name = "downloads 󱃩 "
path = "~/Downloads"
startup_command = "yazi"

# configs

[[session]]
name = "dotfiles"
path = "~/.dotfiles"

[[session]]
name = "wezterm config"
path = "~/.dotfiles/wezterm"
startup_command = "nvim wezterm.lua"

[[session]]
name = "fish config"
path = "~/.dotfiles/fish"
preview_command = "bat --language=fish --style=snip --color=always ~/.dotfiles/fish/config.fish"

[[session]]
name = "kitty config"
path = "~/.dotfiles/kitty"
startup_command = "nvim kitty.conf"

[[session]]
name = "neovim config"
path = "~/.dotfiles/nvim"

[[session]]
name = "sketchybar config"
path = "~/.dotfiles/sketchybar"

[[session]]
name = "sesh config"
path = "~/.config/sesh"
startup_command = "nvim sesh.toml"
preview_command = "bat --language=toml --style=snip --color=always ~/.config/sesh/sesh.toml"

[[session]]
name = "tmux config"
path = "~/.dotfiles/tmux"
startup_command = "nvim tmux.conf"
preview_command = "bat --language=bash --style=snip --color=always ~/.dotfiles/tmux/tmux.conf"

[[session]]
name = "yazi config"
path = "~/.dotfiles/yazi"
startup_command = "nvim yazi.toml"

[[session]]
name = "ghostty config"
path = "~/.dotfiles/ghostty"
startup_command = "nvim config"

[[session]]
name = "karabiner elements config"
path = "~/.dotfiles/karabiner"

[[session]]
name = "yabai config"
path = "~/.dotfiles/yabai"
startup_command = "nvim yabairc"
preview_command = "bat --style=snip --color=always ~/.dotfiles/yabai/yabairc"

[[session]]
name = "skhd config"
path = "~/.dotfiles/skhd"
startup_command = "nvim skhdrc"
preview_command = "bat --style=snip --color=always ~/.dotfiles/skhd/skhdrc"

[[session]]
name = "work"
path = "~/Developer/WorkTools/"
startup_command = "la"
preview_command = "bat --style=snip --color=always ~/.dotfiles/yabai/yabairc"
windows = ["qc","pxe"]

[[window]]
name = "qc"
path = "~/Developer/WorkTools/lifecycle-lemur-master"
startup_script = "la"

[[window]]
name = "pxe"
path = "~/Developer/WorkTools/tools-master/pxe/"
startup_script = "la"
