# The minimal, blazing-fast, and infinitely customizable prompt
# https://starship.rs

scan_timeout = 100
command_timeout = 1000

add_newline = true

format = """
$character\
$directory\
${custom.git_host}\
$git_branch\
${custom.git_worktree}\
$git_status\
$git_metrics\
"""

right_format = """$aws$python$docker_context$terraform"""

palette = "catppuccin_mocha"

[character]
disabled = false
success_symbol = "[вқҜ](bold fg:iris)"
error_symbol = "[вңҳ](red bold)"
vimcmd_symbol = '[пүҪ ](bold fg:maroon)'
vimcmd_replace_one_symbol = '[у°ңү ](bold fg:sapphire)'
vimcmd_visual_symbol = '[фҖӢӯ](bold fg:sapphire)'
# ---

[directory]
style = 'sapphire'
truncation_length = 10
truncation_symbol = 'вҖҰ/оӘғ  '
home_symbol = '~'
read_only_style = '197'
read_only = ' пҖЈ '
format = '[$path]($style)[$read_only]($read_only_style) '
disabled = false

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "о°ӣ "
"Pictures" = "пҖҫ "
"Developer" = "у°ІӢ "
"Others" = "пҮҗ "

[username]
style_user = 'white bold'
style_root = 'red bold'
format = '[$user]($style) '
disabled = true
show_always = false

[git_status]
format = "[$staged$modified$renamed$conflicted$ahead_behind]($style)"
# options available for format
staged     = "[+${count} ](green)"
modified   = "[!${count} ](yellow)"
renamed    = "[В»${count} ](blue)"
deleted    = "[-${count} ](red)"
untracked  = "[?${count} ](sapphire)"
stashed    = "[вүЎ${count} ](lavender)"
conflicted = "[вң–${count} ](red bold)"

ahead      = "[вҮЎ${count} ](teal)"
behind     = "[вҮЈ${count} ](peach)"
diverged   = "[вҮ•вҮЎ${ahead_count}вҮЈ${behind_count} ](mauve)"

[custom.git_worktree]
description = "Show indicator when inside a git worktree"
command = """
if git rev-parse --git-dir >/dev/null 2>&1; then
      common_dir=$(git rev-parse --path-format=absolute --git-common-dir 2>/dev/null)
      git_dir=$(git rev-parse --path-format=absolute --git-dir 2>/dev/null)
      if [ "$common_dir" != "$git_dir" ]; then
            echo "вӣ“ "
      fi
fi
"""
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1"
format = " ([$output ]($style))"
style = "bold green"
require_repo = true
ignore_timeout = true

# Shows current git branch
[git_branch]
symbol = "[оӮ¶](black)пҗҳ "
format =  ' on [$symbol$branch]($style)[оӮҙ](black)'
truncation_symbol = 'вҖҰ/'
style = 'fg:lavender bg:black'
disabled = false

[custom.git_host]
command = """
URL=$(command git ls-remote --get-url 2> /dev/null)
if [[ "$URL" =~ "github" ]]; then
    ICON="пӮӣ  "
elif [[ "$URL" =~ "gitlab" ]]; then
    ICON="пҠ–  "
elif [[ "$URL" =~ "bitbucket" ]];then
    ICON="п…ұ  "
elif [[ "$URL" =~ "kernel" ]];then
    ICON="оң’ "
elif [[ "$URL" =~ "archlinux" ]];then
    ICON="пҢғ "
elif [[ "$URL" =~ "gnu" ]];then
    ICON="оқ№ "
elif [[ "$URL" =~ "git" ]];then
    ICON="оңӮ "
else
    ICON="пҮ’ "
    URL="localhost"
fi
for PATTERN in "https" "http" "git" "://" "@"; do
    [[ "$URL" == "$PATTERN"* ]] && URL="${URL##$PATTERN}"
done
for PATTERN in "/" ".git"; do
    [[ "$URL" == *"$PATTERN" ]] && URL="${URL%%$PATTERN}"
done
printf "%s%s" "$ICON" "$URL"
"""

directories = [".git"]
when = 'git rev-parse --is-inside-work-tree 2> /dev/null'
shell = ["sh","--norc","--noprofile"]
style = "bright-yellow bold"
format = " at [$output]($style)"

#Show git metrics i.e: puts, files, pulls, etc.
[git_metrics]
disabled = false

# Display OS symbol at the very begining
[os]
format = '[$symbol](bold grey)'
disabled = true 

[os.symbols]
Windows = "у°ҚІ"
Ubuntu = "у°•Ҳ"
SUSE = "пҢ”"
Raspbian = "у°җҝ"
Mint = "у°Јӯ"
Macos = "п…№"
Manjaro = "пҢ’"
Linux = "у°ҢҪ"
