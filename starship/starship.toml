# ███████║   ██║   ██║  ██║██║  ██║███████║██║  ██║██║██║
# ╚══════╝   ╚═╝   ╚═╝  ╚═╝╚═╝  ╚═╝╚══════╝╚═╝  ╚═╝╚═╝╚═╝
# The minimal, blazing-fast, and infinitely customizable prompt
# https://starship.rs

scan_timeout = 100
command_timeout = 1000

add_newline = true

format = """
$character\
$directory\
${custom.git_host}\
$git_branch\
${custom.git_worktree}\
$git_status\
$git_metrics\
"""

right_format = """$aws$python$docker_context$terraform"""

palette = "catppuccin_mocha"

[character]
disabled = false
# success_symbol = "[❯](bold fg:overlay1)"
success_symbol = "[ ](bold fg:green)"
error_symbol = "[✘](red bold)"
vimcmd_symbol = '[](bold fg:maroon)'
vimcmd_replace_one_symbol = '[󰜉 ](bold fg:sapphire)'
vimcmd_visual_symbol = '[􀋭 ](bold fg:sapphire)'
# ---

[directory]
style = 'lavender'
truncation_length = 10
# truncation_symbol = '…/  '
home_symbol = '~'
read_only_style = '197'
read_only = '  '
format = '[$path]($style)[$read_only]($read_only_style) '
disabled = false

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "
"Developer" = "󰲋 "
"Others" = " "

[username]
style_user = 'white bold'
style_root = 'red bold'
format = '[$user]($style) '
disabled = true
show_always = false

[git_status]
format = "[$staged$modified$renamed$conflicted$ahead_behind]($style)"
# options available for format
staged     = "[+${count} ](green)"
modified   = "[!${count} ](yellow)"
renamed    = "[»${count} ](blue)"
deleted    = "[-${count} ](red)"
untracked  = "[?${count} ](sapphire)"
stashed    = "[≡${count} ](lavender)"
conflicted = "[✖${count} ](red bold)"
ahead      = "[⇡${count} ](teal)"
behind     = "[⇣${count} ](peach)"
diverged   = "[⇕⇡${ahead_count}⇣${behind_count} ](mauve)"

[custom.git_worktree]
description = "Show indicator when inside a git worktree"
command = """
if git rev-parse --git-dir >/dev/null 2>&1; then
      common_dir=$(git rev-parse --path-format=absolute --git-common-dir 2>/dev/null)
      git_dir=$(git rev-parse --path-format=absolute --git-dir 2>/dev/null)
      if [ "$common_dir" != "$git_dir" ]; then
            echo "⛓ "
      fi
fi
"""
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1"
format = " ([$output ]($style))"
style = "bold green"
require_repo = true
ignore_timeout = true

# Shows current git branch
[git_branch]
symbol = "[](black) "
format =  ' on [$symbol$branch]($style)[](black)'
truncation_symbol = '…/'
style = 'fg:lavender bg:black'
disabled = false

[custom.git_host]
command = """
URL=$(command git ls-remote --get-url 2> /dev/null)
if [[ "$URL" =~ "github" ]]; then
    ICON="  "
elif [[ "$URL" =~ "gitlab" ]]; then
    ICON="  "
elif [[ "$URL" =~ "bitbucket" ]];then
    ICON="  "
elif [[ "$URL" =~ "kernel" ]];then
    ICON=" "
elif [[ "$URL" =~ "archlinux" ]];then
    ICON=" "
elif [[ "$URL" =~ "gnu" ]];then
    ICON=" "
elif [[ "$URL" =~ "git" ]];then
    ICON=" "
else
    ICON=" "
    URL="localhost"
fi
for PATTERN in "https" "http" "git" "://" "@"; do
    [[ "$URL" == "$PATTERN"* ]] && URL="${URL##$PATTERN}"
done
for PATTERN in "/" ".git"; do
    [[ "$URL" == *"$PATTERN" ]] && URL="${URL%%$PATTERN}"
done
printf "%s%s" "$ICON" "$URL"
"""

directories = [".git"]
when = 'git rev-parse --is-inside-work-tree 2> /dev/null'
shell = ["sh","--norc","--noprofile"]
style = "bright-yellow bold"
format = " at [$output]($style)"

#Show git metrics i.e: puts, files, pulls, etc.
[git_metrics]
disabled = false

# Display OS symbol at the very begining
[os]
format = '[$symbol](bold grey)'
disabled = true 

[os.symbols]
Windows = "󰍲"
Ubuntu = "󰕈"
SUSE = ""
Raspbian = "󰐿"
Mint = "󰣭"
Macos = ""
Manjaro = ""
Linux = "󰌽"
Gentoo = "󰣨"
Fedora = "󰣛"
Alpine = ""
Amazon = ""
Android = ""
Arch = "󰣇"
Artix = "󰣇"
CentOS = ""
Debian = "󰣚"
Redhat = "󱄛"

[aws]
disabled = true
symbol = " "
format = "[ $symbol( $context) ]($style)"

[terraform]
symbol = " "
format = "[ $symbol( $context) ]($style)"

[python]
symbol = '  '
format = "[ $symbol( $context) ]($style)"

[docker_context]
symbol = " "
format = "[ $symbol( $context) ]($style)"

[kubernetes]
symbol = '󱃾 '
format = "[ $symbol( $context) ]($style)"

