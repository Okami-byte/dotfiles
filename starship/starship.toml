Fedora = "у°Јӣ"
Alpine = "пҢҖ"
Amazon = "пү°"
Android = "оңҺ"
Arch = "у°ЈҮ"
Artix = "у°ЈҮ"
CentOS = "пҢ„"
Debian = "у°Јҡ"
Redhat = "уұ„ӣ"
RedHatEnterprise = "уұ„ӣ"

[aws]
disabled = true
symbol = "оҢҪ "
format = "[ $symbol( $context) ]($style)"

[terraform]
symbol = "п„ө "
format = "[ $symbol( $context) ]($style)"

[python]
symbol = 'оҲө  '
format = "[ $symbol( $context) ]($style)"

[docker_context]
symbol = "пҢҲ "
format = "[ $symbol( $context) ]($style)"

[kubernetes]
symbol = 'уұғҫ '
format = "[ $symbol( $context) ]($style)"

